---
# project.pre-commit-hooks.yaml
# Generic version-consistency hook.
#
# Scans only the repo's main entry-point script and its Dockerfile for version
# declarations:
#   Root-level R script (*.r or *.R, directly in repo root):
#     script_version <- "x.y.z"
#   Dockerfile (repo root or docker/): LABEL version="x.y.z"
#
# Fails if more than one distinct version string is found among those files.
# Safe to use in any project that follows these conventions; no file names are
# hardcoded.
#
# Prerequisites:
#   System: bash, git, grep (GNU, with -P/--perl-regexp support)

repos:
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        exclude: '(^|/)tests/'

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.0
    hooks:
      - id: yamllint
        args: [--strict]

  - repo: local
    hooks:

      # The main root-level R script and the Dockerfile must carry the same
      # version string. Helper scripts under scripts/, test/, etc. are not
      # checked — only the repo's single entry-point script matters here.
      - id: version-sync
        name: Version strings must be consistent across the repository
        entry: |-
          bash -c '
            r_pat="script_version\s*<-\s*\"\K[0-9]+\.[0-9]+(\.[0-9]+)?"
            docker_pat="version=\"\K[0-9]+\.[0-9]+(\.[0-9]+)?"
            versions=$(
              git ls-files "*.r" "*.R" 2>/dev/null | grep -v "/" \
                | xargs -r grep -hoP "$r_pat" 2>/dev/null || true;
              git ls-files 2>/dev/null \
                | grep -E "^(docker/)?Dockerfile([^/]*)$" \
                | xargs -r grep -hom1 -oP "$docker_pat" 2>/dev/null || true;
            )
            [ -z "$versions" ] && exit 0
            unique=$(printf "%s\n" $versions | sort -u)
            count=$(printf "%s\n" $versions | sort -u | grep -c .)
            if [ "$count" -gt 1 ]; then
              echo "FAIL: inconsistent version strings found:"
              printf "%s\n" $versions | sort
              exit 1
            fi
            echo "version-sync OK: $unique"
          '
        language: system
        pass_filenames: false
        always_run: true

      # Warn when README.md contains local filesystem paths or bare GitHub
      # repo shorthands
      - id: readme-no-local-paths
        name: README.md should not contain local paths or bare GitHub shorthands
        entry: scripts/check-readme-paths.sh
        language: script
        files: '(^|/)README\.md$'
        pass_filenames: true

      # Check that all http(s) URLs in README.md are reachable
      - id: readme-url-check
        name: README.md URLs should be reachable
        entry: scripts/check-readme-urls.sh
        language: script
        files: '(^|/)README\.md$'
        pass_filenames: true
