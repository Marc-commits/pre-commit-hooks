# R.pre-commit-hooks.yaml  (also serves as r.pre-commit-hooks.yaml on case-sensitive FS)
# Pre-commit hooks for R source files (.R) and executable R scripts (.r).
#
# .R files: style (tidyverse via styler), linting (lintr), parse validation,
#           renv lockfile check, metadata presence
# .r files: all of the above + shebang (#!/usr/bin/env r),
#           executability checks, --help / --version / -V contract,
#           stdin/stdout capability advertised in --help, no pkg startup messages
# All:      whitespace hygiene, binary guard, private-key detection, git hygiene
#
# Prerequisites:
#   R packages : precommit, styler, lintr
#                Rscript -e 'install.packages(c("precommit","styler","lintr"))'
#   System     : r (littler), pre-commit
#
# Usage:
#   pre-commit run --all-files --config R.pre-commit-hooks.yaml
#   pre-commit autoupdate --config R.pre-commit-hooks.yaml

repos:

  # ── Common file-quality gates ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-added-large-files
      - id: detect-private-key
      # Scoped to .r only: .R source files are not executable scripts
      - id: check-executables-have-shebangs
        files: '\.r$'
      - id: check-shebang-scripts-are-executable
        files: '\.r$'

  # ── Pre-commit manifest validator ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit
    rev: v4.6.0
    hooks:
      - id: validate_manifest

  # ── Git hygiene ────────────────────────────────────────────────────────────
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: forbid-binary
      - id: git-check

  # ── R code quality ─────────────────────────────────────────────────────────
  # pre-commit's built-in "r" type covers both .R and .r; the files: pattern is
  # an explicit guard.
  # NOTE: style-files (styler) may attempt to reformat the shebang line of .r
  # scripts. Add  exclude: '\.r$'  to that hook if it causes issues.
  - repo: https://github.com/lorenzwalthert/precommit
    rev: v0.4.3
    hooks:
      - id: style-files
        args: [--style_pkg=styler, --style_fun=tidyverse_style]
        files: '\.(R|r)$'
        exclude: '(^|/)tests/'
      - id: parsable-R
        files: '\.(R|r)$'
        exclude: '(^|/)tests/'
      - id: lintr
        files: '\.(R|r)$'
        exclude: '(^|/)tests/'
      - id: renv-lockfile-validate
      - id: no-browser-statement
        files: '\.(R|r)$'
        exclude: '(^|/)tests/'
      - id: no-debug-statement
        files: '\.(R|r)$'
        exclude: '(^|/)tests/'
      - id: no-print-statement
        files: '\.(R|r)$'
        exclude: '(^|/)tests/'

  # ── Local policy hooks ─────────────────────────────────────────────────────
  - repo: local
    hooks:

      # Executable .r scripts must declare #!/usr/bin/env r as line 1
      - id: r-script-shebang
        name: Executable .r scripts must have #!/usr/bin/env r shebang
        entry: |-
          bash -c 'rc=0; for f; do [[ -x "$f" ]] || continue; head -1 "$f" | grep -qF "#!/usr/bin/env r" || { echo "FAIL: $f - missing #!/usr/bin/env r on line 1"; rc=1; }; done; exit $rc' --
        language: system
        files: '\.r$'
        exclude: '(^|/)tests/'
        pass_filenames: true

      # Executable .r scripts must be runnable and support --help, --version and -V
      # --help: tested via r (littler handles it); --version/-V: tested via both
      # r and Rscript (littler may intercept these flags for itself, so both are
      # checked independently)
      - id: r-script-runnable
        name: Executable .r scripts must exit 0 on --help, --version and -V
        entry: |-
          bash -c 'rc=0; for f; do [[ -x "$f" ]] || continue; r "$f" --help >/dev/null 2>&1 || { echo "FAIL: r $f --help exited non-zero"; rc=1; }; Rscript "$f" --version >/dev/null 2>&1 || { echo "FAIL: Rscript $f --version exited non-zero"; rc=1; }; r "$f" -V >/dev/null 2>&1 || { echo "FAIL: r $f -V exited non-zero"; rc=1; }; Rscript "$f" -V >/dev/null 2>&1 || { echo "FAIL: Rscript $f -V exited non-zero"; rc=1; }; done; exit $rc' --
        language: system
        files: '\.r$'
        exclude: '(^|/)tests/'
        pass_filenames: true

      # Executable .r scripts must advertise stdin and stdout in --help output
      - id: r-script-stdin-stdout
        name: Executable .r scripts must advertise stdin and stdout in --help
        entry: |-
          bash -c 'rc=0; for f; do [[ -x "$f" ]] || continue; for runner in r Rscript; do out=$("$runner" "$f" --help 2>&1); echo "$out" | grep -qi "stdin" || { echo "FAIL: $runner $f --help does not mention stdin"; rc=1; }; echo "$out" | grep -qi "stdout" || { echo "FAIL: $runner $f --help does not mention stdout"; rc=1; }; done; done; exit $rc' --
        language: system
        files: '\.r$'
        exclude: '(^|/)tests/'
        pass_filenames: true

      # All .R/.r files must contain the words version, author, email
      # (case-insensitive grep; no specific format is enforced)
      - id: r-metadata
        name: R files must contain version, author and email metadata
        entry: |-
          bash -c 'rc=0; for f; do for kw in version author email; do grep -qi "$kw" "$f" || { echo "FAIL: $f - missing $kw metadata"; rc=1; }; done; done; exit $rc' --
        language: system
        files: '\.(R|r)$'
        exclude: '(^|/)tests/'
        pass_filenames: true

      # Executable .r scripts must print startup banner on --version.
      # Tests three properties:
      #   1. Banner includes R version: "running R <major>.<minor>"
      #   2. Banner includes args section: "with args: ..."
      #   3. Extra args passed alongside --version appear in the args section
      # Uses Rscript (not r/littler) because littler intercepts --version for itself.
      - id: r-script-startup-banner
        name: Executable .r scripts must print startup banner on --version
        entry: |-
          bash -c 'rc=0; for f; do [[ -x "$f" ]] || continue; out=$(Rscript "$f" --version 2>&1); echo "$out" | grep -qE "This is .+ running R [0-9]+\.[0-9.]+ with args:" || { echo "FAIL: $f banner missing R version or with-args section"; rc=1; continue; }; out2=$(Rscript "$f" --version --sentinel-arg 2>&1); echo "$out2" | grep -qF "with args: --sentinel-arg" || { echo "FAIL: $f banner does not reflect extra args"; rc=1; }; done; exit $rc' --
        language: system
        files: '\.r$'
        exclude: '(^|/)tests/'
        pass_filenames: true

      # Executable .r scripts must suppress banner with --quiet
      # Uses Rscript (not r/littler) because littler intercepts --version for itself
      - id: r-script-quiet-banner
        name: Executable .r scripts must suppress banner with --quiet
        entry: |-
          bash -c 'rc=0; for f; do [[ -x "$f" ]] || continue; output=$(Rscript "$f" --quiet --version 2>&1); echo "$output" | grep -qE "This is " && { echo "FAIL: $f --quiet --version still prints startup banner"; rc=1; }; done; exit $rc' --
        language: system
        files: '\.r$'
        exclude: '(^|/)tests/'
        pass_filenames: true

      # Running executable .r scripts must not emit package startup noise.
      # Tests via --help (a safe, non-destructive invocation). Scripts must wrap
      # library() calls with suppressPackageStartupMessages().
      - id: r-script-no-pkg-startup
        name: Executable .r scripts must not print package startup messages
        entry: |-
          bash -c 'rc=0; for f; do [[ -x "$f" ]] || continue; out=$(Rscript "$f" --help 2>&1); echo "$out" | grep -qiE "^Loading (required )?package:|^Attaching package:|^The following object" && { echo "FAIL: $f prints package startup messages — wrap library() with suppressPackageStartupMessages()"; rc=1; }; done; exit $rc' --
        language: system
        files: '\.r$'
        exclude: '(^|/)tests/'
        pass_filenames: true

      # Executable .r scripts must call sessionInfo() in the last 50 lines.
      # Ensures reproducibility tracing is always present at script end.
      - id: r-script-session-info
        name: Executable .r scripts must call sessionInfo() at the end
        entry: |-
          bash -c 'rc=0; for f; do [[ -x "$f" ]] || continue; total=$(wc -l < "$f"); check=$((total < 50 ? total : 50)); tail -n "$check" "$f" | grep -qF "sessionInfo()" || { echo "FAIL: $f - sessionInfo() not found in last 50 lines"; rc=1; }; done; exit $rc' --
        language: system
        files: '\.r$'
        exclude: '(^|/)tests/'
        pass_filenames: true
