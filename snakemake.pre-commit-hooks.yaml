---
# snakemake.pre-commit-hooks.yaml
# Pre-commit hooks for Snakemake workflows (Snakefile, *.smk).
#
# Checks: snakefmt format (PEP 8-style for Snakefiles),
#         snakemake --lint (built-in rule/workflow linter),
#         shellcheck + shfmt for workflow/scripts/*.sh,
#         lintr + styler + parsable-R for workflow/scripts/*.{R,r},
#         check-ast for workflow/scripts/*.py,
#         conda env dry-run for workflow/envs/*.{yaml,yml},
#         whitespace hygiene, binary guard, private-key detection, git hygiene
# See: https://snakemake.readthedocs.io/en/stable/snakefiles/best_practices.html
#
# Prerequisites:
# System: snakemake (>=8), snakefmt, shellcheck, shfmt, conda (with libmamba
# solver),
#           pre-commit
#           pip install snakemake snakefmt
#   R packages: precommit, styler, lintr
#               Rscript -e 'install.packages(c("precommit","styler","lintr"))'
#
# Usage:
#   pre-commit run --all-files --config snakemake.pre-commit-hooks.yaml
#   pre-commit autoupdate --config snakemake.pre-commit-hooks.yaml

repos:

  # ── Common file-quality gates ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-added-large-files
      - id: detect-private-key
      # Python AST check scoped to workflow scripts
      - id: check-ast
        files: 'workflow/scripts/.*\.py$'

  # ── Pre-commit manifest validator ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit
    rev: v4.6.0
    hooks:
      - id: validate_manifest

  # ── Git hygiene + shell linting for workflow scripts ──────────────────────
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: forbid-binary
      - id: git-check
      # Shell linting scoped to non-executable workflow scripts
      - id: shellcheck
        files: 'workflow/scripts/.*\.sh$'
      - id: shfmt
        files: 'workflow/scripts/.*\.sh$'

  # ── R linting for workflow scripts ────────────────────────────────────────
  - repo: https://github.com/lorenzwalthert/precommit
    rev: v0.4.3
    hooks:
      - id: style-files
        args: [--style_pkg=styler, --style_fun=tidyverse_style]
        files: 'workflow/scripts/.*\.(R|r)$'
      - id: parsable-R
        files: 'workflow/scripts/.*\.(R|r)$'
      - id: lintr
        files: 'workflow/scripts/.*\.(R|r)$'
      - id: no-browser-statement
        files: 'workflow/scripts/.*\.(R|r)$'
      - id: no-debug-statement
        files: 'workflow/scripts/.*\.(R|r)$'
      - id: no-print-statement
        files: 'workflow/scripts/.*\.(R|r)$'

  # ── Snakemake format ───────────────────────────────────────────────────────
  # snakefmt enforces PEP 8-style formatting for Snakefiles and .smk modules.
  - repo: https://github.com/snakemake/snakefmt
    rev: v0.10.2
    hooks:
      - id: snakefmt

  # ── Local policy hooks ─────────────────────────────────────────────────────
  - repo: local
    hooks:

      # snakemake --lint runs the built-in workflow linter, checking rule
      # structure, wildcard usage, and best-practice patterns.
      - id: snakemake-lint
        name: snakemake --lint
        entry: |-
          bash -c 'rc=0; for f; do snakemake --lint --snakefile "$f" 2>&1 ||  \
            { echo "FAIL: snakemake --lint failed for $f"; rc=1; }; done;  \
            exit $rc' --
        language: system
        files: '(^|/)Snakefile$|\.smk$'
        pass_filenames: true

      # Workflow shell scripts must use strict mode (non-executable scripts
      # are not covered by the sh-specific shebang/usage/version hooks)
      - id: workflow-sh-strict-mode
        name: Workflow shell scripts must contain set -euo pipefail
        entry: |-
          bash -c 'rc=0; for f; do grep -qF "set -euo pipefail" "$f" || {  \
            echo "FAIL: $f - missing set -euo pipefail"; rc=1; }; done; exit  \
            $rc' --
        language: system
        files: 'workflow/scripts/.*\.sh$'
        pass_filenames: true

      # Conda environment files must be resolvable (dry-run, no env created)
      - id: conda-env-validate
        name: Conda environment files must be resolvable (libmamba dry-run)
        entry: |-
          bash -c 'rc=0; for f; do conda env create --solver libmamba -d -f  \
            "$f" 2>&1 || { echo  \
            "FAIL: conda env create --dry-run failed for $f"; rc=1; }; done;  \
            exit $rc' --
        language: system
        files: 'workflow/envs/.*\.ya?ml$'
        pass_filenames: true

      # Regenerate workflow/rulegraph.svg whenever Snakemake rules change.
      # Requires graphviz (dot) on PATH. The updated SVG must be staged
      # manually.
      - id: snakemake-rulegraph
        name: Snakemake rulegraph visualization
        entry: |-
          bash -c 'PYTHONHASHSEED=0 snakemake --rulegraph --forceall  \
            2>/dev/null | dot -Tsvg > workflow/rulegraph.svg'
        language: system
        files: '(^|/)Snakefile$|\.smk$'
        pass_filenames: false

      # snakemake --containerize generates a Dockerfile with all conda envs
      # embedded.
      # Stage the updated Dockerfile manually.
      - id: snakemake-containerize
        name: Snakemake Dockerfile generation (--containerize)
        entry: |-
          bash -c 'snakemake --containerize --forceall 2>/dev/null > Dockerfile'
        language: system
        files: '(^|/)Snakefile$|\.smk$|workflow/envs/.*\.ya?ml$'
        pass_filenames: false

        # ── snakedeploy maintenance hooks (commented out — uncomment after
        # testing) ───
        #
        # These are formatter-style hooks: snakedeploy mutates files in-place,
        # then git diff --exit-code fails the hook if anything changed, forcing
        # the author to review and re-stage. Run manually first to confirm
        # behavior on your repo.
        #
        # Prerequisites: pip install snakedeploy
        #
        # - repo: local
        #   hooks:

        # Hook A: update-snakemake-wrappers
        # Pins all wrapper: directives in Snakefiles to their current latest
        # release.
        # Fails if any version strings changed — author must review the diff and
        # re-stage before committing.
        #
        # - id: snakedeploy-update-wrappers
        #   name: Snakemake wrappers must be at latest versions (snakedeploy)
        #   entry: |-
        # bash -c 'rc=0; for f; do snakedeploy update-snakemake-wrappers "$f"
        # 2>&1 || { echo "FAIL: snakedeploy update-snakemake-wrappers failed
        # for $f"; rc=1; continue; }; git diff --exit-code -- "$f" >/dev/null
        # 2>&1 || { echo "FAIL: $f wrapper versions were updated — review and
        # re-stage"; rc=1; }; done; exit $rc' --
        #   language: system
        #   files: '(^|/)Snakefile$|\.smk$'
        #   pass_filenames: true

        # Hook B: update-conda-envs
        # Sets all packages in workflow/envs/*.yaml to their latest feasible
        # versions. Fails if any version pins changed — author must review.
        #
        # - id: snakedeploy-update-conda-envs
        # name: Conda env packages must be at latest feasible versions
        # (snakedeploy)
        #   entry: |-
        # bash -c 'rc=0; for f; do snakedeploy update-conda-envs "$f" 2>&1 || {
        # echo "FAIL: snakedeploy update-conda-envs failed for $f"; rc=1;
        # continue; }; git diff --exit-code -- "$f" >/dev/null 2>&1 || { echo
        # "FAIL: $f conda versions were updated — review and re-stage"; rc=1; };
        # done; exit $rc' --
        #   language: system
        #   files: 'workflow/envs/.*\.ya?ml$'
        #   pass_filenames: true

        # Hook C: pin-conda-envs
        # Locks conda packages to exact compatible URLs (creates/updates
        # lockfiles).
        # Behavior: may write a companion lockfile alongside the .yaml rather
        # than modifying it in-place — verify the output path before enabling.
        # If it modifies the .yaml in-place, the git diff check below catches
        # it.
        # If it writes a separate lockfile, replace git diff with: git status
        # --short
        #
        # - id: snakedeploy-pin-conda-envs
        # name: Conda environments must have up-to-date pin lockfiles
        # (snakedeploy)
        #   entry: |-
        # bash -c 'rc=0; for f; do snakedeploy pin-conda-envs "$f" 2>&1 || {
        # echo "FAIL: snakedeploy pin-conda-envs failed for $f"; rc=1; continue;
        # }; git diff --exit-code -- "$f" >/dev/null 2>&1 || { echo "FAIL: $f
        # pin lockfile was updated — review and re-stage"; rc=1; }; done; exit
