# sh.pre-commit-hooks.yaml
# Pre-commit hooks for Bash/shell scripts (.sh).
#
# All .sh:        shellcheck lint, shfmt style, strict-mode guard (set -euo pipefail),
#                 .sh extension policy, whitespace hygiene, binary guard,
#                 private-key detection, git hygiene, metadata presence
# Executable .sh: shebang must be #!/usr/bin/env bash;
#                 usage banner required; --help, --version and -V must exit 0
#
# Prerequisites:
#   System: bash, shellcheck (https://www.shellcheck.net/),
#           shfmt (https://github.com/mvdan/sh), pre-commit
#
# Usage:
#   pre-commit run --all-files --config sh.pre-commit-hooks.yaml
#   pre-commit autoupdate --config sh.pre-commit-hooks.yaml

repos:

  # ── Common file-quality gates ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-added-large-files
      - id: detect-private-key
      # Scoped to .sh to avoid false positives in mixed-language repos
      - id: check-executables-have-shebangs
        files: '\.sh$'
      - id: check-shebang-scripts-are-executable
        files: '\.sh$'

  # ── Pre-commit manifest validator ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit
    rev: v4.6.0
    hooks:
      - id: validate_manifest

  # ── Git hygiene + shell-specific quality ──────────────────────────────────
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: forbid-binary
      - id: git-check
      # Local policy: all shell scripts (executable or not) must use .sh extension
      - id: script-must-have-extension
        name: Local policy is to use .sh extension for shell scripts
        types: [shell, executable]
        exclude: '(^|/)\.envrc$'
      - id: shellcheck
        exclude: '(^|/)\.envrc$'
      - id: shfmt
        exclude: '(^|/)\.envrc$'

  # ── Local policy hooks ─────────────────────────────────────────────────────
  - repo: local
    hooks:

      # Executable .sh scripts must declare #!/usr/bin/env bash as line 1
      - id: sh-bash-shebang
        name: Executable .sh scripts must have #!/usr/bin/env bash shebang
        entry: |-
          bash -c 'rc=0; for f; do [[ -x "$f" ]] || continue; head -1 "$f" | grep -qF "#!/usr/bin/env bash" || { echo "FAIL: $f - missing #!/usr/bin/env bash on line 1"; rc=1; }; done; exit $rc' --
        language: system
        files: '\.sh$'
        exclude: '(^|/)tests/'
        pass_filenames: true

      # Executable .sh scripts must contain a Usage: section
      - id: sh-usage-banner
        name: Executable .sh scripts must have a Usage banner
        entry: |-
          bash -c 'rc=0; for f; do [[ -x "$f" ]] || continue; grep -qi "usage:" "$f" || { echo "FAIL: $f - missing Usage banner (no \"usage:\" pattern found)"; rc=1; }; done; exit $rc' --
        language: system
        files: '\.sh$'
        exclude: '(^|/)tests/|(^|/)test/|(^|/)[^/]*(run|test)[^/]*\.sh$'
        pass_filenames: true

      # All .sh scripts must contain  set -euo pipefail  (strict mode)
      - id: sh-strict-mode
        name: Shell scripts must contain set -euo pipefail
        entry: |-
          bash -c 'rc=0; for f; do grep -qF "set -euo pipefail" "$f" || { echo "FAIL: $f - missing set -euo pipefail (strict mode required)"; rc=1; }; done; exit $rc' --
        language: system
        files: '\.sh$'
        exclude: '(^|/)tests/'
        pass_filenames: true

      # Executable .sh scripts must exit 0 on --help, --version and -V
      - id: sh-help-version
        name: Executable .sh scripts must exit 0 on --help, --version and -V
        entry: |-
          bash -c 'rc=0; for f; do [[ -x "$f" ]] || continue; bash "$f" --help >/dev/null 2>&1 || { echo "FAIL: bash $f --help exited non-zero"; rc=1; }; bash "$f" --version >/dev/null 2>&1 || { echo "FAIL: bash $f --version exited non-zero"; rc=1; }; bash "$f" -V >/dev/null 2>&1 || { echo "FAIL: bash $f -V exited non-zero"; rc=1; }; done; exit $rc' --
        language: system
        files: '\.sh$'
        exclude: '(^|/)tests/|(^|/)test/|(^|/)(build\.sh|[^/]*(run|test)[^/]*\.sh)$'
        pass_filenames: true

      # All .sh files must contain the words version, author, email
      # (case-insensitive grep; no specific format is enforced)
      - id: sh-metadata
        name: Shell scripts must contain version, author and email metadata
        entry: |-
          bash -c 'rc=0; for f; do for kw in version author email; do grep -qi "$kw" "$f" || { echo "FAIL: $f - missing $kw metadata"; rc=1; }; done; done; exit $rc' --
        language: system
        files: '\.sh$'
        exclude: '(^|/)tests/|^test\.sh$'
        pass_filenames: true
